info:
  name: Crear alumno
  type: http
  seq: 1

http:
  method: POST
  url: "{{url}}/alumno"
  body:
    type: json
    data: |-
      {
        "nombre": "Tome",
        "apellidos": "Fernandez",
        "dni": "121212",
        "direccion": "Rua fast",
        "telefono": "111222333"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
