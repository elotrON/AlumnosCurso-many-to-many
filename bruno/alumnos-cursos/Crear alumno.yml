info:
  name: Crear alumno
  type: http
  seq: 1

http:
  method: POST
  url: "{{url}}/alumno"
  body:
    type: json
    data: |-
      {
         "nombre": "Juan Carlos",
         "apellidos": "Gomez",
         "dni": "789797",
         "direccion": "Calle falsa 123",
         "telefono": "666777888"
        
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
